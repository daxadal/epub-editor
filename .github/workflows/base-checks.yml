name: Base checks
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

jobs:
  base-checks:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout branch"
        uses: actions/checkout@v4

      - name: "Setup node environment"
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: "Install dependencies"
        run: npm ci

      - name: "Build"
        run: npm run tsc

      - name: "Test"
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: junit-results
          path: junit.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: "Lint"
        run: npm run lint
